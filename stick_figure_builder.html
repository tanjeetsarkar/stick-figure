
<style>
canvas { display: block; border: 0.5px solid var(--border); border-radius: var(--radius); background: var(--surface-2); cursor: crosshair; }
.controls { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; align-items: center; }
label { font-size: 13px; color: var(--text-secondary); }
select, input[type=range] { font-size: 13px; }
.stat { font-size: 12px; color: var(--text-muted); min-width: 80px; }
</style>

<h2 class="sr-only">Interactive stick figure canvas with draggable joints</h2>

<div class="controls">
  <label>Color</label>
  <input type="color" id="colorPicker" value="#334155" style="height:28px;width:40px;border:0.5px solid var(--border);border-radius:4px;cursor:pointer;">
  <label>Stroke</label>
  <input type="range" id="strokeWidth" min="1" max="8" value="3" style="width:80px;">
  <span class="stat" id="strokeVal">3px</span>
  <label>Scale</label>
  <input type="range" id="scaleRatio" min="0.5" max="2" step="0.1" value="1" style="width:80px;">
  <span class="stat" id="scaleVal">1.0x</span>
  <button onclick="resetFigure()" style="margin-left:auto;">↺ Reset pose</button>
  <button onclick="printRelativeCoordinates()">📋 Print coords</button>
  <button onclick="sendPrompt('Can you add animation or more features to this stick figure builder?')">Enhance ↗</button>
</div>

<canvas id="c" width="680" height="420"></canvas>
<p style="font-size:12px;color:var(--text-muted);margin-top:8px;">Drag any joint to pose the figure.</p>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const colorPicker = document.getElementById('colorPicker');
const strokeSlider = document.getElementById('strokeWidth');
const strokeVal = document.getElementById('strokeVal');
const scaleSlider = document.getElementById('scaleRatio');
const scaleVal = document.getElementById('scaleVal');

const W = 680, H = 420;
canvas.width = W; canvas.height = H;

let strokeColor = '#334155';
let strokeW = 3;
let scale = 1;

colorPicker.addEventListener('input', e => { strokeColor = e.target.value; draw(); });
strokeSlider.addEventListener('input', e => { strokeW = +e.target.value; strokeVal.textContent = strokeW + 'px'; draw(); });
scaleSlider.addEventListener('input', e => { scale = +e.target.value; scaleVal.textContent = scale.toFixed(1) + 'x'; draw(); });

const defaultJoints = () => ({
  head:    { x: 340, y: 80 },
  neck:    { x: 340, y: 115 },
  lshoulder: { x: 295, y: 145 },
  rshoulder: { x: 385, y: 145 },
  lelbow:  { x: 265, y: 195 },
  relbow:  { x: 415, y: 195 },
  lhand:   { x: 245, y: 245 },
  rhand:   { x: 435, y: 245 },
  hip:     { x: 340, y: 215 },
  lhip:    { x: 315, y: 240 },
  rhip:    { x: 365, y: 240 },
  lknee:   { x: 305, y: 305 },
  rknee:   { x: 375, y: 305 },
  lfoot:   { x: 295, y: 370 },
  rfoot:   { x: 385, y: 370 },
});

let joints = defaultJoints();

const RADIUS = 8;
const HEAD_R = 28;

function resetFigure() {
  joints = defaultJoints();
  draw();
}

function printRelativeCoordinates() {
  const defaultAbsolute = defaultJoints();
  const reference = defaultAbsolute.hip; // Use hip as (0,0)
  
  const relative = {};
  for (const [name, pos] of Object.entries(defaultAbsolute)) {
    relative[name] = {
      x: pos.x - reference.x,
      y: pos.y - reference.y
    };
  }
  
  console.log('Relative coordinates (hip as origin):');
  console.log(JSON.stringify(relative, null, 2));
  alert('Coordinates printed to console (F12 to view)');
}

function line(a, b) {
  ctx.beginPath();
  ctx.moveTo(a.x, a.y);
  ctx.lineTo(b.x, b.y);
  ctx.strokeStyle = strokeColor;
  ctx.lineWidth = strokeW;
  ctx.lineCap = 'round';
  ctx.stroke();
}

function dot(j, r = RADIUS) {
  ctx.beginPath();
  ctx.arc(j.x, j.y, r, 0, Math.PI * 2);
  ctx.fillStyle = strokeColor + '33';
  ctx.fill();
  ctx.strokeStyle = strokeColor;
  ctx.lineWidth = 1.5;
  ctx.stroke();
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  const j = joints;
  
  // Apply scaling relative to canvas center
  const centerX = W / 2, centerY = H / 2;
  const scaledJoints = {};
  for (const [name, pos] of Object.entries(j)) {
    scaledJoints[name] = {
      x: centerX + (pos.x - centerX) * scale,
      y: centerY + (pos.y - centerY) * scale
    };
  }
  const sj = scaledJoints;

  ctx.lineWidth = strokeW;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  // Torso
  line(sj.neck, sj.hip);
  line(sj.lshoulder, sj.rshoulder);
  line(sj.lhip, sj.rhip);
  line(sj.neck, sj.lshoulder);
  line(sj.neck, sj.rshoulder);
  line(sj.hip, sj.lhip);
  line(sj.hip, sj.rhip);

  // Arms
  line(sj.lshoulder, sj.lelbow);
  line(sj.lelbow, sj.lhand);
  line(sj.rshoulder, sj.relbow);
  line(sj.relbow, sj.rhand);

  // Legs
  line(sj.lhip, sj.lknee);
  line(sj.lknee, sj.lfoot);
  line(sj.rhip, sj.rknee);
  line(sj.rknee, sj.rfoot);

  // Neck
  line(sj.head, sj.neck);

  // Head circle
  ctx.beginPath();
  ctx.arc(sj.head.x, sj.head.y, HEAD_R * scale, 0, Math.PI * 2);
  ctx.strokeStyle = strokeColor;
  ctx.lineWidth = strokeW;
  ctx.fillStyle = 'transparent';
  ctx.stroke();

  // Joints (draggable dots)
  Object.entries(scaledJoints).forEach(([k, jt]) => {
    if (k === 'head') return;
    dot(jt, RADIUS * scale);
  });
}

// Dragging
let dragging = null;
const jointKeys = Object.keys(defaultJoints());

function getJointAt(x, y) {
  const centerX = W / 2, centerY = H / 2;
  for (const k of jointKeys) {
    const j = joints[k];
    const scaledX = centerX + (j.x - centerX) * scale;
    const scaledY = centerY + (j.y - centerY) * scale;
    const r = k === 'head' ? HEAD_R * scale : RADIUS * scale;
    const dx = x - scaledX, dy = y - scaledY;
    if (dx*dx + dy*dy <= r*r) return k;
  }
  return null;
}

function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  if (e.touches) {
    return { x: (e.touches[0].clientX - rect.left) * scaleX, y: (e.touches[0].clientY - rect.top) * scaleY };
  }
  return { x: (e.clientX - rect.left) * scaleX, y: (e.clientY - rect.top) * scaleY };
}

canvas.addEventListener('mousedown', e => {
  const pos = getPos(e);
  dragging = getJointAt(pos.x, pos.y);
  if (dragging) canvas.style.cursor = 'grabbing';
});
canvas.addEventListener('mousemove', e => {
  const pos = getPos(e);
  if (dragging) {
    // Convert scaled position back to unscaled coordinate
    const centerX = W / 2, centerY = H / 2;
    joints[dragging].x = centerX + (pos.x - centerX) / scale;
    joints[dragging].y = centerY + (pos.y - centerY) / scale;
    draw();
  } else {
    canvas.style.cursor = getJointAt(pos.x, pos.y) ? 'grab' : 'default';
  }
});
canvas.addEventListener('mouseup', () => { dragging = null; canvas.style.cursor = 'default'; });
canvas.addEventListener('mouseleave', () => { dragging = null; });

canvas.addEventListener('touchstart', e => { e.preventDefault(); const pos = getPos(e); dragging = getJointAt(pos.x, pos.y); }, { passive: false });
canvas.addEventListener('touchmove', e => { e.preventDefault(); if (!dragging) return; const pos = getPos(e); const centerX = W / 2, centerY = H / 2; joints[dragging].x = centerX + (pos.x - centerX) / scale; joints[dragging].y = centerY + (pos.y - centerY) / scale; draw(); }, { passive: false });
canvas.addEventListener('touchend', () => { dragging = null; });

draw();
</script>
